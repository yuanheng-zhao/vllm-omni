# Split-VAE topology for Qwen-Image (RFC #2089).
#
# Stage 0 runs the Qwen-Image DiT denoising loop but skips the local VAE
# decode, emitting packed latents + geometry through
# OmniRequestOutput.custom_output["remote_vae_payload"].
# The split behavior is opt-in via `engine_args.remote_vae: true` below.
#
# Stage 1 hosts a dedicated VAE (StageVAEProc); the orchestrator routes
# the packed latents via `latents_from_diffusion` and awaits the decoded
# image as final output.

model_type: qwen_image

stages:
  - stage_id: 0
    model_stage: qwen_image
    stage_type: diffusion
    input_sources: []
    final_output: false
    runtime:
      devices: "0"
    engine_args:
      model_arch: QwenImagePipeline
      mode: text-to-image
      remote_vae: true

  - stage_id: 1
    model_stage: qwen_image_vae
    stage_type: vae
    input_sources: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.qwen_image_vae.latents_from_diffusion
    final_output: true
    final_output_type: image
    runtime:
      devices: "1"
    engine_args:
      vae_subfolder: vae
      torch_dtype: bfloat16

edges:
  - from: 0
    to: 1
    window_size: -1
