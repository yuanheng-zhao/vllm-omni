# Ming-flash-omni-2.0 deploy: thinker + talker.
#
# Stage 0: Thinker: multimodal understanding -> text generation.
#          TP=4 or (PP=4) across 4 GPUs.
# Stage 1: Talker: text -> audio waveform via CFM + AudioVAE.
#          Generation worker, runs eager, colocates on the last GPU.
async_chunk: false

trust_remote_code: true
distributed_executor_backend: mp
enable_prefix_caching: false

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.74
    enforce_eager: false
    tensor_parallel_size: 4
    max_num_batched_tokens: 32768
    devices: "0,1,2,3"
    # disable fused allreduce+rms for flashinfer version mismatch for now
    compilation_config:
      pass_config:
        fuse_allreduce_rms: false
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      max_tokens: 2048
      repetition_penalty: 1.05
      detokenize: true
      ignore_eos: false

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.18
    enforce_eager: true
    max_num_batched_tokens: 1000000
    devices: "3"
    default_sampling_params:
      temperature: 0.0
      max_tokens: 1
