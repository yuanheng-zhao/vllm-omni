# Ming-flash-omni-2.0 STREAMING deploy: thinker + talker via async_chunk.
#
# Identical topology to ming_flash_omni.yaml, but with async_chunk: true
# The talker begins synthesizing sentence N while the thinker is still
# generating sentence N+1, cutting time-to-first-audio.
pipeline: ming_flash_omni
async_chunk: true

trust_remote_code: true
distributed_executor_backend: mp
enable_prefix_caching: false

connectors:
  connector_of_shared_memory:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 65536
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300

stages:
  - stage_id: 0
    max_num_seqs: 1
    gpu_memory_utilization: 0.74
    enforce_eager: false
    tensor_parallel_size: 4
    max_num_batched_tokens: 32768
    devices: "0,1,2,3"
    # disable fused allreduce+rms for flashinfer version mismatch for now
    compilation_config:
      pass_config:
        fuse_allreduce_rms: false
    output_connectors:
      to_stage_1: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      max_tokens: 2048
      repetition_penalty: 1.05
      detokenize: true
      ignore_eos: false

  - stage_id: 1
    # Raised above 1 so streamed sentences from concurrent requests can be
    # synthesized without head-of-line blocking.
    max_num_seqs: 4
    gpu_memory_utilization: 0.18
    enforce_eager: true
    max_num_batched_tokens: 1000000
    devices: "3"
    input_connectors:
      from_stage_0: connector_of_shared_memory
    default_sampling_params:
      temperature: 0.0
      max_tokens: 1

# Ming-flash-omni-2.0 has only been verified on CUDA devices.
platforms: {}
